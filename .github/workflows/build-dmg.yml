name: Build macOS DMG

# Builds a self-contained `stig` CLI binary with PyInstaller and packages it
# into an installable .dmg for both Apple Silicon and Intel Macs.
#
# Runs on:
#   - pushes to the default branch and PRs that touch the app or packaging
#     (build + smoke-test + upload artifacts, no release)
#   - version tags v* (also attaches the .dmg files to a GitHub Release)
#   - manual dispatch

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "stig/**"
      - "packaging/**"
      - "pyproject.toml"
      - ".github/workflows/build-dmg.yml"
  pull_request:
    paths:
      - "stig/**"
      - "packaging/**"
      - "pyproject.toml"
      - ".github/workflows/build-dmg.yml"
  workflow_dispatch:

permissions:
  contents: write  # needed to attach .dmg assets to a Release on tag builds

jobs:
  build:
    name: Build DMG (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14      # Apple Silicon
            arch: arm64
          - runner: macos-13      # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package plus the optional anthropic extra so the frozen
          # binary can drive live activations; then the PyInstaller toolchain.
          pip install ".[anthropic]" pyinstaller

      - name: Resolve version and arch
        id: meta
        run: |
          VERSION="$(python -c 'import stig; print(stig.__version__)')"
          ARCH="$(uname -m)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
          echo "dmg=stig-${VERSION}-macos-${ARCH}.dmg" >> "$GITHUB_OUTPUT"

      - name: Build standalone binary
        working-directory: packaging
        run: |
          pyinstaller stig.spec \
            --distpath "$GITHUB_WORKSPACE/dist" \
            --workpath "$GITHUB_WORKSPACE/build/pyinstaller" \
            --noconfirm

      - name: Smoke-test the binary
        run: |
          chmod +x dist/stig
          ./dist/stig --help
          ./dist/stig --version

      - name: Stage DMG contents
        run: |
          STAGE="dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp dist/stig "$STAGE/stig"
          cp packaging/install.command "$STAGE/install.command"
          cp packaging/README-dmg.txt "$STAGE/README.txt"
          chmod +x "$STAGE/stig" "$STAGE/install.command"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Stig ${{ steps.meta.outputs.version }}" \
            -srcfolder "dmg-stage" \
            -ov -format UDZO \
            "${{ steps.meta.outputs.dmg }}"
          echo "Built ${{ steps.meta.outputs.dmg }}"
          hdiutil imageinfo "${{ steps.meta.outputs.dmg }}" | head -n 20

      - name: Verify DMG mounts and installs
        run: |
          MNT="$(mktemp -d)"
          hdiutil attach "${{ steps.meta.outputs.dmg }}" -mountpoint "$MNT" -nobrowse -quiet
          test -x "$MNT/stig"
          test -x "$MNT/install.command"
          "$MNT/stig" --help >/dev/null
          hdiutil detach "$MNT" -quiet
          echo "DMG verified."

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.dmg }}
          path: ${{ steps.meta.outputs.dmg }}
          if-no-files-found: error

      - name: Attach DMG to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.dmg }}
          fail_on_unmatched_files: true
